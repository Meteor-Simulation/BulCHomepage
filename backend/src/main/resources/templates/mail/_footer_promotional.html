    <p style="margin:0;font-size:11px;color:#9ca3af;line-height:1.6;">
      {{company.name}} ({{company.representative}})<br>
      {{company.address}}<br>
      사업자등록번호: {{company.businessNumber}} &nbsp;|&nbsp; 문의: {{company.contactEmail}}
